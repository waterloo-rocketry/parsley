name: Run Unit Tests

# Runs on pushes to pull request
on: pull_request

jobs:
  build:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv package manager
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Update dependency
        run: uv sync
      - name: Run tests
        run: uv run pytest
